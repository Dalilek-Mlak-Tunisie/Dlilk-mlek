<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلك ملك - النظام المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #ffd700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .header { background: #1a1a1a; padding: 20px; border-bottom: 3px solid #ffd700; box-shadow: 0 4px 15px rgba(255,215,0,0.2); cursor: pointer; }
        .card { background: #111; border: 2px solid #ffd700; border-radius: 20px; padding: 25px; margin: 20px; box-shadow: 0 0 20px rgba(255,215,0,0.1); }
        .btn { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 10px; width: 90%; font-size: 18px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #gamePage { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .box { background: #222; border: 2px solid #ffd700; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 15px; cursor: pointer; transition: 0.3s; color: #ffd700; font-weight: bold; }
        .win-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 4px solid #ffd700; padding: 40px; border-radius: 25px; z-index: 3000; display: none; width: 80%; box-shadow: 0 0 50px #000; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; padding-top: 60px; }
        input { padding: 15px; width: 80%; margin: 10px; border-radius: 10px; background: #1a1a1a; color: #fff; border: 1px solid #ffd700; font-size: 18px; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="shahnPage">
        <div class="header" onclick="triggerAdmin()"><h1>دليلك ملك 💰</h1></div>
        <div class="card">
            <h2 style="margin-top:0;">🏦 محفظة الرصيد</h2>
            <p style="color: #ccc;">لشحن حسابك، أرسل ID الخاص بك:</p>
            <p style="font-size: 28px; background: #222; padding: 10px; border-radius: 10px;"><b id="uId">...</b></p>
            <div style="font-size:32px; color:#0f0; margin: 20px 0;">رصيدك الحالي: <br><b id="balance">0</b> DT</div>
            <p style="font-size: 14px; color: #888;">D17: 56151868</p>
        </div>
        <button class="btn" onclick="goToGame()">إبدأ اللعب الآن (5 DT) 🚀</button>
    </div>

    <div id="gamePage">
        <h2 id="gameStatus">اختر صندوقك واربح المليون! 🎁</h2>
        <div class="grid" id="boxGrid"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff; margin-top:30px;">عودة للقائمة</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:#ffd700;">⚙️ لوحة التحكم عن بُعد</h2>
        <input type="text" id="targetId" placeholder="ID المتسابق (مثلاً: 28653)">
        <input type="number" id="amt" placeholder="المبلغ المراد شحنه">
        <button class="btn" onclick="sendSold()">✅ تنفيذ الشحن الفوري</button>
        <button class="btn" onclick="closeAdmin()" style="background:#500; color:#fff;">إغلاق اللوحة</button>
    </div>

    <div id="winPopup" class="win-popup">
        <h2 id="winTitle" style="color:#ffd700;">مبروك! 🎉</h2>
        <p id="winMsg" style="font-size:24px; color:#fff;"></p>
        <button class="btn" onclick="location.reload()">إضافة للرصيد واللعب مجدداً</button>
    </div>

    <script>
        // ربط السيرفر النهائي
        const firebaseConfig = { databaseURL: "https://dlilk-mlek-21ae9-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('dlik_id_vFinal') || 'ID-' + Math.floor(Math.random() * 89999 + 10000);
        localStorage.setItem('dlik_id_vFinal', myId);
        document.getElementById('uId').innerText = myId;

        // مراقبة الرصيد لحظة بلحظة (من قريب ومن بعيد)
        db.ref('players/' + myId).on('value', (s) => {
            let val = (s.val() && s.val().points) ? s.val().points : 0;
            document.getElementById('balance').innerText = val.toFixed(2);
            window.currentPoints = val;
        });

        function goToGame() {
            if(window.currentPoints < 5) {
                alert("رصيدك غير كافي! أقل مبلغ للدخول هو 5 DT");
            } else {
                db.ref('players/' + myId).update({ points: window.currentPoints - 5 });
                document.getElementById('shahnPage').style.display = 'none';
                document.getElementById('gamePage').style.display = 'block';
                initBoxes();
            }
        }

        // نظام الصناديق الذكي (المليون مستحيل)
        function initBoxes() {
            const grid = document.getElementById('boxGrid');
            const prizes = ["0.5", "1.2", "2.0", "3.1", "0.2", "خسارة", "0.1", "مليون", "0.8"];
            prizes.sort(() => Math.random() - 0.5);

            prizes.forEach((p, i) => {
                let b = document.createElement('div');
                b.className = 'box';
                b.innerText = i + 1;
                b.onclick = function() {
                    this.style.pointerEvents = 'none'; // منع النقر مرتين
                    if(p === "مليون" || p === "خسارة") {
                        this.style.background = "#500";
                        this.innerText = "❌";
                        alert("للأسف، الصندوق فارغ! حاول مرة أخرى.");
                    } else {
                        this.style.background = "#050";
                        this.innerText = p + " DT";
                        // إضافة الربح للرصيد في السيرفر أوتوماتيكياً
                        db.ref('players/' + myId).update({ points: window.currentPoints + parseFloat(p) });
                        document.getElementById('winMsg').innerText = "ربحت " + p + " DT أضيفت لرصيدك!";
                        document.getElementById('winPopup').style.display = 'block';
                    }
                };
                grid.appendChild(b);
            });
        }

        // لوحة الموزع (3 نقرات على العنوان)
        let taps = 0;
        function triggerAdmin() {
            taps++;
            if(taps >= 3) {
                let p = prompt("كود الوصول السريع:");
                if(p === "5615") document.getElementById('adminPanel').style.display = 'block';
                taps = 0;
            }
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function sendSold() {
            let t = document.getElementById('targetId').value.trim();
            if(!t.startsWith("ID-")) t = "ID-" + t;
            let a = parseFloat(document.getElementById('amt').value);
            if(!t || isNaN(a)) return alert("خطأ في البيانات!");

            db.ref('players/' + t).once('value').then(s => {
                let old = (s.val() && s.val().points) ? s.val().points : 0;
                db.ref('players/' + t).set({ points: old + a }).then(() => {
                    alert("✅ تم إرسال " + a + " DT بنجاح للحساب " + t);
                    closeAdmin();
                });
            });
        }
    </script>
</body>
</html>
