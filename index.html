<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلك ملك 🇹🇳 - PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #ff3333; --blue: #0066cc; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; user-select: none; }
        
        .header { background: linear-gradient(180deg, #222, #000); padding: 15px; border-bottom: 3px solid var(--gold); }
        
        /* واجهة الدخول */
        #auth-page { padding: 40px 20px; }
        .auth-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; }
        
        /* الصفحة الرئيسية */
        #main-page { display: none; padding: 20px; }
        .balance-card { background: #1a1a1a; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .balance-val { font-size: 40px; color: #0f0; font-weight: bold; }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        
        /* اللعبة */
        #game-page { display: none; }
        .boxes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; max-width: 500px; margin: auto; }
        .box { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; padding: 18px 0; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px #664e00; }
        .box.opened { background: #222 !important; color: #444 !important; box-shadow: none !important; }
        .box.mine { border: 2px solid #fff; box-shadow: 0 0 10px #fff; }
        
        .p-list { display: flex; justify-content: space-between; padding: 5px; font-size: 10px; }
        .p-col { width: 49%; display: flex; flex-direction: column; gap: 2px; }
        .p-item { padding: 3px; border-radius: 3px; font-weight: bold; border: 1px solid #222; }
        .p-blue { background: var(--blue); }
        .p-red { background: var(--red); }
        .p-item.out { opacity: 0.1; filter: grayscale(1); }

        /* البوب-أب */
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 3px solid var(--gold); padding: 30px; border-radius: 25px; width: 85%; display: none; z-index: 1000; box-shadow: 0 0 50px #000; }
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; padding-top: 50px; }
    </style>
</head>
<body>

    <audio id="s-start" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="s-open" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="s-phone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div class="header">
        <h1 id="secret-trigger" style="margin:0; font-size: 24px;">دليلك ملك 🇹🇳</h1>
    </div>

    <div id="auth-page">
        <div class="auth-card">
            <h2>مرحباً بيك</h2>
            <input type="text" id="user" placeholder="اسم المستخدم (Username)">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button class="btn-main" onclick="login()">دخول / إنشاء حساب</button>
        </div>
    </div>

    <div id="main-page">
        <div class="balance-card">
            <p style="margin:0; color: #888;">رصيدك الحالي</p>
            <div class="balance-val" id="user-bal">0.000 DT</div>
            <p>المستخدم: <b id="display-name" style="color:var(--gold)"></b></p>
            <button class="btn-wa" onclick="contactAdmin()">💳 اشحن رصيدك (WhatsApp)</button>
        </div>
        <button class="btn-main" style="height: 100px; font-size: 24px;" onclick="startGame()">إبدأ العرض (5 DT)</button>
    </div>

    <div id="game-page">
        <div style="background:#111; padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid #333;">
            <span>💰 <b id="game-bal">0.000</b></span>
            <span id="game-status" style="color:var(--gold)">اختر صندوقك</span>
        </div>
        <div class="p-list">
            <div class="p-col" id="list-blue"></div>
            <div class="p-col" id="list-red"></div>
        </div>
        <div class="boxes-grid" id="grid"></div>
    </div>

    <div id="offer-popup" class="popup">
        <h2 style="color:var(--gold)">🏦 عرض البنكاجي</h2>
        <h1 id="offer-val" style="color:#0f0; font-size: 40px;">0.000</h1>
        <button class="btn-main" onclick="deal(true)">ناخذ الكاش</button>
        <button class="btn-main" style="background:#333; color:#fff" onclick="deal(false)">نكمل نلعب</button>
    </div>

    <div id="win-popup" class="popup">
        <h2 style="color:var(--gold); margin-bottom: 10px;">انتهى العرض!</h2>
        <p style="font-size: 18px;">مبروك! لقد فزت بـ:</p>
        <h1 id="win-prize-txt" style="color:#0f0; font-size: 45px; margin: 15px 0;">--</h1>
        <button class="btn-main" onclick="backToMenu()">العودة إلى القائمة الرئيسية</button>
    </div>

    <div id="admin-panel">
        <h2 style="color:var(--gold)">لوحة الموزع 🛠️</h2>
        <input type="text" id="adm-user" placeholder="Username">
        <input type="number" id="adm-amt" placeholder="المبلغ بالدينار">
        <div style="display:flex; justify-content: center; gap: 10px; width: 90%; margin: auto;">
            <button class="btn-main" style="background:#00ff00;" onclick="adjust(1)">صب (+)</button>
            <button class="btn-main" style="background:#ff3333;" onclick="adjust(-1)">سحب (-)</button>
        </div>
        <button onclick="closeAdmin()" style="margin-top: 50px; background: none; border: 1px solid #fff; color: #fff; padding: 10px 40px; border-radius: 10px;">إغلاق</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dlilk-mlek-21ae9-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const MY_WA = "21656151868";
        const ADM_PASS = "5615";

        let currentUser = null;
        let userData = { points: 0 };
        let myBox = null, gameData = [], openedCount = 0, isOver = false;

        const blueP = ["شلاكة", "بصلة", "هريسة", "مفتاح 12", "سباط", "خيط كيت", "بستاشو", "قارصة", "1 DT", "0.5 DT", "ولاعة", "تيكتاك"];
        const redP = [5, 10, 20, 50, 100, 200, 300, 400, 500, 700, 800, 1000];

        // --- نظام الدخول ---
        function login() {
            let u = document.getElementById('user').value.toLowerCase().trim();
            let p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("دخل الاسم وكلمة السر");
            db.ref('users/' + u).once('value').then(s => {
                if(s.exists()) {
                    if(s.val().password === p) loadUser(u);
                    else alert("كلمة السر غلط!");
                } else {
                    db.ref('users/' + u).set({ password: p, points: 0 }).then(() => loadUser(u));
                }
            });
        }

        function loadUser(u) {
            currentUser = u;
            document.getElementById('display-name').innerText = u;
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            db.ref('users/' + u).on('value', s => {
                userData = s.val();
                document.getElementById('user-bal').innerText = userData.points.toFixed(3) + " DT";
                document.getElementById('game-bal').innerText = userData.points.toFixed(3) + " DT";
            });
        }

        // --- اللعبة ---
        function startGame() {
            if(userData.points < 5) return alert("رصيدك ناقص!");
            db.ref('users/' + currentUser).update({ points: userData.points - 5 });
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'block';
            document.getElementById('s-start').play();
            setupBoard();
        }

        function setupBoard() {
            const bDiv = document.getElementById('list-blue'), rDiv = document.getElementById('list-red');
            bDiv.innerHTML = ''; rDiv.innerHTML = '';
            blueP.forEach(p => bDiv.innerHTML += `<div class="p-item p-blue" id="p-${p}">${p}</div>`);
            redP.forEach(p => rDiv.innerHTML += `<div class="p-item p-red" id="p-${p}">${p} DT</div>`);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=1; i<=24; i++) {
                let box = document.createElement('div');
                box.className = 'box'; box.innerText = i;
                box.onclick = () => openBox(box, i-1);
                grid.appendChild(box);
            }
            openedCount = 0; isOver = false; myBox = null;
        }

        function openBox(el, idx) {
            if(isOver || el.classList.contains('opened')) return;
            document.getElementById('s-open').currentTime = 0;
            document.getElementById('s-open').play();
            if(!myBox) {
                let p = blueP[Math.floor(Math.random()*blueP.length)];
                myBox = { idx: idx, val: p };
                el.classList.add('mine');
                let others = [...blueP.filter(x => x!==p), ...redP].sort(()=>Math.random()-0.5);
                for(let i=0; i<24; i++) gameData[i] = (i===idx) ? p : others.shift();
                document.getElementById('game-status').innerText = "كمل حل الصناديق";
            } else {
                if(idx === myBox.idx) return;
                el.classList.add('opened');
                let val = gameData[idx];
                el.innerText = typeof val === 'number' ? val+" DT" : val;
                if(document.getElementById('p-'+val)) document.getElementById('p-'+val).classList.add('out');
                openedCount++;
                if([5, 10, 15, 20, 22].includes(openedCount)) showOffer();
                if(openedCount === 23) showFinalResult(myBox.val);
            }
        }

        function showOffer() {
            document.getElementById('s-phone').play();
            let win = Math.random() < 0.02; 
            let val = win ? (Math.random()*5+5).toFixed(3) : (Math.random()*0.4).toFixed(3);
            document.getElementById('offer-val').innerText = val + " DT";
            document.getElementById('offer-popup').style.display = 'block';
            window.currentOffer = parseFloat(val);
        }

        function deal(ok) {
            document.getElementById('offer-popup').style.display = 'none';
            if(ok) {
                db.ref('users/' + currentUser).update({ points: userData.points + window.currentOffer });
                showFinalResult(window.currentOffer.toFixed(3) + " DT");
            }
        }

        function showFinalResult(v) {
            isOver = true;
            document.getElementById('s-win').play();
            document.getElementById('win-prize-txt').innerText = (typeof v === 'number' ? v + " DT" : v);
            document.getElementById('win-popup').style.display = 'block';
        }

        function backToMenu() {
            document.getElementById('win-popup').style.display = 'none';
            document.getElementById('game-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }

        // --- الموزع (Secret Control) ---
        let pressTimer;
        const trigger = document.getElementById('secret-trigger');
        trigger.addEventListener('mousedown', () => pressTimer = setTimeout(openAdmin, 3000));
        trigger.addEventListener('touchstart', () => pressTimer = setTimeout(openAdmin, 3000));
        trigger.addEventListener('mouseup', () => clearTimeout(pressTimer));
        trigger.addEventListener('touchend', () => clearTimeout(pressTimer));

        function openAdmin() {
            if(prompt("كلمة سر الموزع:") === ADM_PASS) document.getElementById('admin-panel').style.display = 'block';
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        function adjust(type) {
            let u = document.getElementById('adm-user').value.toLowerCase().trim();
            let a = parseFloat(document.getElementById('adm-amt').value);
            db.ref('users/' + u).once('value', s => {
                if(s.exists()) {
                    db.ref('users/' + u).update({ points: s.val().points + (a * type) });
                    alert("مريغل! تم التعديل.");
                } else alert("Username غير موجود!");
            });
        }

        function contactAdmin() {
            let msg = `نحب نشحن رصيدي.\nUsername: ${currentUser}`;
            window.open(`https://wa.me/${MY_WA}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
