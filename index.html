<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلك ملك - النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: Arial; text-align: center; margin: 0; padding: 20px; }
        .box { border: 2px solid #d4af37; padding: 20px; margin: 10px; border-radius: 10px; background: #222; }
        button { background: #d4af37; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #d4af37; background: #333; color: white; margin: 5px; }
        #adminPanel { display: none; background: #000; border: 3px solid red; padding: 20px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
    </style>
</head>
<body>

    <div class="box">
        <h2>💰 رصيدك الحالي</h2>
        <h1 id="userBalance">0</h1>
        <p>الـ ID الخاص بك: <b id="userIdDisplay">...</b></p>
    </div>

    <button onclick="checkAdmin()">لوحة الآدمن (خاصة بك)</button>

    <div id="adminPanel">
        <h3>🚀 شحن الرصيد للمشتركين</h3>
        <input type="text" id="targetId" placeholder="اكتب ID المتسابق">
        <input type="number" id="amount" placeholder="عدد النقاط">
        <br><br>
        <button onclick="sendPoints()">إرسال النقاط</button>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:gray">إغلاق</button>
    </div>

    <script>
        // إعدادات السيرفر (Firebase)
        const firebaseConfig = {
            databaseURL: "https://dlik-mlek-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // صنع ID فريد لكل تليفون
        let myId = localStorage.getItem('myDlikId') || 'ID-' + Math.floor(Math.random() * 90000 + 10000);
        localStorage.setItem('myDlikId', myId);
        document.getElementById('userIdDisplay').innerText = myId;

        // تحديث الرصيد أوتوماتيكياً من السيرفر
        db.ref('players/' + myId).on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('userBalance').innerText = data ? data.points : 0;
        });

        // وظيفة الآدمن
        function checkAdmin() {
            let pass = prompt("أدخل كود الآدمن:");
            if(pass === "5615") {
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("كود خاطئ!");
            }
        }

        // إرسال النقاط لأي ID في تونس
        function sendPoints() {
            let target = document.getElementById('targetId').value;
            let pointsToAdd = parseInt(document.getElementById('amount').value);

            if(target && pointsToAdd) {
                db.ref('players/' + target).once('value').then((snapshot) => {
                    let currentPoints = (snapshot.val() && snapshot.val().points) ? snapshot.val().points : 0;
                    db.ref('players/' + target).set({
                        points: currentPoints + pointsToAdd
                    }).then(() => {
                        alert("تم شحن " + pointsToAdd + " نقاط للـ ID: " + target);
                    });
                });
            }
        }
    </script>
</body>
</html>
