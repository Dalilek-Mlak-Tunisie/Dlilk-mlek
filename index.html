<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليلك ملك - النسخة الرسمية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #ffd700; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #ffd700; cursor: pointer; }
        .card { background: #111; border: 2px solid #ffd700; border-radius: 15px; padding: 20px; margin: 20px; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .btn { background: #ffd700; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 10px; width: 85%; font-size: 16px; }
        input { padding: 15px; width: 85%; margin: 10px; border-radius: 8px; border: 1px solid #ffd700; background: #222; color: #fff; text-align: center; font-size: 18px; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 50px; }
        .status { font-size: 20px; margin: 10px; color: #0f0; }
    </style>
</head>
<body>

    <div class="header" onclick="triggerAdmin()">
        <h1>دليلك ملك</h1>
    </div>

    <div id="mainPage">
        <div class="card">
            <h2>🏦 شحن الرصيد</h2>
            <p>D17: <b style="color:#fff;">56151868</b></p>
            <p>ID الخاص بك: <b id="uId" style="color:#fff; font-size:24px;">...</b></p>
            <hr border="1" color="#ffd700">
            <div class="status">رصيدك: <b id="balance">0</b> DT</div>
        </div>
        <button class="btn" onclick="startGame()">إبدأ اللعب الآن (5 DT)</button>
    </div>

    <div id="adminPanel">
        <h2>🏦 لوحة الموزع المعتمد</h2>
        <input type="text" id="targetId" placeholder="ID المتسابق (مثلاً: 28653)">
        <input type="number" id="amt" placeholder="المبلغ (DT)">
        <button class="btn" onclick="sendSold()">✅ تنفيذ الشحن الفوري</button>
        <button class="btn" onclick="document.getElementById('adminPanel').style.display='none'" style="background:#444; color:#fff">خروج</button>
    </div>

    <script>
        // الرابط الصحيح متاعك تم وضعه هنا بنجاح
        const firebaseConfig = { 
            databaseURL: "https://dlilk-mlek-21ae9-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // صنع الـ ID للمتسابق
        let myId = localStorage.getItem('dlik_id_vFinal') || 'ID-' + Math.floor(Math.random() * 89999 + 10000);
        localStorage.setItem('dlik_id_vFinal', myId);
        document.getElementById('uId').innerText = myId;

        // قراءة الرصيد لحظة بلحظة من السيرفر
        db.ref('players/' + myId).on('value', (s) => {
            let val = (s.val() && s.val().points) ? s.val().points : 0;
            document.getElementById('balance').innerText = val;
            window.currentPoints = val;
        });

        function startGame() {
            if(window.currentPoints < 5) {
                alert("رصيدك غير كافي، يرجى الشحن (أقل مبلغ 5 DT)");
            } else {
                db.ref('players/' + myId).update({ points: window.currentPoints - 5 });
                alert("بالتوفيق في اللعبة!");
            }
        }

        // لوحة الموزع (اضغط 3 مرات على العنوان)
        let taps = 0;
        function triggerAdmin() {
            taps++;
            if(taps >= 3) {
                let p = prompt("كود الموزع:");
                if(p === "5615") document.getElementById('adminPanel').style.display = 'block';
                taps = 0;
            }
        }

        function sendSold() {
            let t = document.getElementById('targetId').value.trim();
            let a = parseFloat(document.getElementById('amt').value);
            
            // تصحيح أوتوماتيكي للـ ID
            if(!t.startsWith("ID-")) t = "ID-" + t;

            if(!t || isNaN(a)) return alert("ثبت في الـ ID والمبلغ!");

            db.ref('players/' + t).once('value').then(s => {
                let old = (s.val() && s.val().points) ? s.val().points : 0;
                db.ref('players/' + t).set({ points: old + a }).then(() => {
                    alert("✅ تم شحن " + a + " DT للحساب: " + t);
                    document.getElementById('adminPanel').style.display = 'none';
                });
            });
        }
    </script>
</body>
</html>
